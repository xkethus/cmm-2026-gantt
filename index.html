<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CMM 2026 · Gantt interactivo y saturación</title>
<style>
:root{
  --bg:#0f1117; --panel:#171a23; --panel2:#1d2130; --line:#2a2f3e;
  --txt:#e7eaf0; --mut:#9aa3b2; --accent:#6ea8fe;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
header{padding:18px 24px 6px}
h1{margin:0 0 2px;font-size:20px}
.sub{color:var(--mut);font-size:13px;margin-bottom:10px}
.controls{display:flex;flex-wrap:wrap;gap:8px 14px;align-items:center;padding:6px 24px 14px}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
  border-radius:20px;padding:4px 11px;cursor:pointer;user-select:none;font-size:12.5px;color:var(--txt)}
.chip input{accent-color:var(--accent);margin:0}
.chip .dot{width:10px;height:10px;border-radius:50%}
.chip.off{opacity:.38}
.toggle{display:inline-flex;gap:6px;align-items:center;color:var(--mut);font-size:12.5px;cursor:pointer}
.kpis{display:flex;gap:10px;flex-wrap:wrap;padding:0 24px 10px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 14px;min-width:120px}
.kpi b{display:block;font-size:21px;line-height:1.1}
.kpi span{color:var(--mut);font-size:11.5px}
.wrap{overflow-x:auto;overflow-y:hidden;border-top:1px solid var(--line);position:relative}
.chart{position:relative}
.row{position:relative;display:flex;align-items:stretch;border-bottom:1px solid var(--line)}
.lab{position:sticky;left:0;z-index:6;background:var(--panel);border-right:1px solid var(--line);
  width:240px;min-width:240px;padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:7px}
.lab .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track{position:relative;flex:1}
.bar{position:absolute;top:5px;height:20px;border-radius:5px;cursor:pointer;overflow:hidden;
  box-shadow:0 1px 2px rgba(0,0,0,.35);display:flex;align-items:center}
.bar .t{font-size:10.5px;color:#0b0d12;padding:0 6px;white-space:nowrap;font-weight:600;opacity:.92}
.bar.tent{background-image:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.18) 4px,rgba(0,0,0,.18) 8px)}
.bar.cont{opacity:.5;border:1px dashed rgba(255,255,255,.5)}
.grp{position:sticky;left:0;z-index:7;background:var(--panel2);padding:5px 12px;font-weight:700;
  font-size:12px;letter-spacing:.3px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.grp .dot{width:11px;height:11px;border-radius:3px}
.months{position:sticky;top:0;z-index:8;display:flex;background:var(--panel);border-bottom:1px solid var(--line)}
.months .lab{background:var(--panel);font-weight:700}
.mcell{position:absolute;top:0;height:100%;border-left:1px solid var(--line);font-size:11px;color:var(--mut);
  padding:5px 0 0 6px;text-transform:uppercase;letter-spacing:.5px}
.heatrow{position:relative;display:flex;border-bottom:2px solid var(--line)}
.heatrow .lab{background:var(--panel);font-weight:700;flex-direction:column;align-items:flex-start;gap:2px;justify-content:center}
.heatrow .lab small{color:var(--mut);font-weight:400;font-size:10.5px}
.heatcell{position:absolute;top:0;height:100%}
.gridline{position:absolute;top:0;bottom:0;border-left:1px solid rgba(255,255,255,.045);pointer-events:none}
#tip{position:fixed;z-index:50;pointer-events:none;background:#0b0d12;border:1px solid var(--line);
  border-radius:8px;padding:9px 11px;max-width:330px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
#tip h4{margin:0 0 4px;font-size:12.5px}
#tip .meta{color:var(--mut);font-size:11px;margin-top:3px}
#tip .raw{color:var(--accent);font-size:11px;margin-top:5px;border-top:1px solid var(--line);padding-top:4px}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:8px 24px 18px;color:var(--mut);font-size:11.5px;align-items:center}
.legend .sw{display:inline-flex;align-items:center;gap:5px}
.legend .box{width:22px;height:12px;border-radius:3px;display:inline-block}
.scale{display:inline-flex;height:12px;width:160px;border-radius:3px;
  background:linear-gradient(90deg,#1d3b2f,#3a7d3a,#cfd14a,#e8923a,#d6453a)}
.peak{position:absolute;top:0;bottom:0;background:rgba(214,69,58,.10);border-left:1px dashed rgba(214,69,58,.5);
  border-right:1px dashed rgba(214,69,58,.5);pointer-events:none;z-index:1}
.peak span{position:absolute;top:2px;left:4px;font-size:9.5px;color:#ff8a7d;font-weight:700;white-space:nowrap}
</style>
</head>

<header>

<div class="wrap" id="wrap"><div class="chart" id="chart"></div></div>

  <span class="sw"><span class="box" style="background:#6ea8fe;opacity:.5;border:1px dashed #fff"></span>permanente</span>

</div>

ulo": "Taller >Principios de Animación 2D para Videojuegos", "fecha_raw": "5 al 9 de octubre", "imparte": "Manuel Bernado Ramos Ortiz", "lugar": "Sala PC", "modalidad": "Presencial", "inicio": "2026-10-05", "fin": "2026-10-09", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Taller >Introducción a la programación de videojuegos en Godot", "fecha_raw": "Junio del 22 al 26", "imparte": "Guillermo Sánchez Basoco", "lugar": "Sala PC", "modalidad": "Presencial", "inicio": "2026-06-22", "fin": "2026-06-26", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Taller >Introducción al desarrollo de experiencias de Realidad Virtual", "fecha_raw": "18 al 22 de mayo", "imparte": "Luis Romero Ramos", "lugar": "Sala PC", "modalidad": "Presencial", "inicio": "2026-05-18", "fin": "2026-05-22", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Taller >Introducción a la impresión 3D", "fecha_raw": "21 al 25 de septiembre", "imparte": "Luis Romero Ramos", "lugar": "Sala PC", "modalidad": "Presencial", "inicio": "2026-09-21", "fin": "2026-09-25", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Taller >Introducción al Diseño de Videojuegos Críticos y Experimentales", "fecha_raw": "16 al 29 de noviembre", "imparte": "Guillermo Sánchez Basoco", "lugar": "Sala PC", "modalidad": "Presencial", "inicio": "2026-11-16", "fin": "2026-11-29", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "LEIVA", "fecha_raw": "Julio-Septiembre", "imparte": "LabRVV", "lugar": "Área Común del Centro Multimedia y Sala PC", "modalidad": "Presencial", "inicio": "2026-07-01", "fin": "2026-09-30", "flags": ["tentativa"]}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Charla: Los videojuegos en la ciencia: Aplicaciones en la investigación", "fecha_raw": "2026-03-26 00:00:00", "imparte": "Katya Alvarez Molina y Luis Romero Ramos", "lugar": "Área Común del Centro Multimedia de 17 a 19 h", "modalidad": "Presencial", "inicio": "2026-03-26", "fin": "2026-03-26", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Global Game Jam", "fecha_raw": "Del 30 de enero al 1 de febrero", "imparte": "LabRVV", "lugar": "Área Común del Centro Multimedia", "modalidad": "Presencial", "inicio": "2026-01-30", "fin": "2026-02-01", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Reconstrucción y mantenimiento de impresoras 3D", "fecha_raw": "Del 21 al 25 de Septiembre", "imparte": "LabRVV", "lugar": "LabRVV", "modalidad": "", "inicio": "2026-09-21", "fin": "2026-09-25", "flags": []}, {"area": "Realidad Virtual", "area_code": "RV", "titulo": "Mantenimiento de cascos RV", "fecha_raw": "19 al 23 de octubre", "imparte": "LabRVV", "lugar": "LabRVV", "modalidad": "", "inicio": "2026-10-19", "fin": "2026-10-23", "flags": []}], "undated": [{"area": "Producción/Diseño", "area_code": "PD", "titulo": "Asesoría en la Fábrica de producción editorial > Nuevas formas de narrar", "fecha_raw": "", "imparte": "Nohelia Meza (Investigadora)", "lugar": "En línea", "modalidad": "En línea", "inicio": null, "fin": null, "flags": ["sin_fecha"]}]};
const Y=2026, DAYW=3.4, LAB=240;
const MES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const AREACOLORS={'Producción/Diseño':'#6ea8fe','Gráfica Digital':'#5fd0c5','Audio':'#f4a259',
 'Ingeniería':'#b388eb','IER (Electrónica)':'#e85d75','TIM (Animación)':'#7bc96f',
 'Investigación':'#e8c84a','Realidad Virtual':'#4ea8de'};
const D0=new Date(Date.UTC(Y,0,1));
const DAYS=( (new Date(Date.UTC(Y,11,31))-D0)/86400000 )+1;
const WIDTH=DAYS*DAYW;
function di(iso){return Math.round((new Date(iso+'T00:00:00Z')-D0)/86400000);}
function dlabel(iso){const[y,m,d]=iso.split('-');return d+' '+MES[+m-1];}

let areaOn={}; Object.keys(AREACOLORS).forEach(a=>areaOn[a]=true);
let countCont=false, showTent=true;

const chart=document.getElementById('chart');
const tip=document.getElementById('tip');

function visibleActs(){
  return DATA.acts.filter(a=>areaOn[a.area] && (showTent|| !(a.flags||[]).includes('tentativa')));
}
function heatActs(){ // for saturation: discrete unless countCont
  return visibleActs().filter(a=> countCont || !(a.flags||[]).includes('continua'));
}
function computeHeat(){
  const c=new Array(DAYS).fill(0);
  heatActs().forEach(a=>{for(let i=di(a.inicio);i<=di(a.fin);i++) if(i>=0&&i<DAYS)c[i]++;});
  return c;
}
function heatColor(v,mx){
  if(v<=0)return '#141722';
  const t=v/mx;
  const stops=[[29,59,47],[58,125,58],[207,209,74],[232,146,58],[214,69,58]];
  const p=t*(stops.length-1); const i=Math.min(stops.length-2,Math.floor(p)); const f=p-i;
  const c=stops[i].map((s,k)=>Math.round(s+(stops[i+1][k]-s)*f));
  return 'rgb('+c.join(',')+')';
}

function render(){
  chart.innerHTML='';
  chart.style.width=(WIDTH+LAB)+'px';
  const heat=computeHeat();
  const mx=Math.max(1,...heat);

  // months header
  const mh=document.createElement('div');mh.className='months';
  const ml=document.createElement('div');ml.className='lab';ml.textContent='Mes';mh.appendChild(ml);
  const mt=document.createElement('div');mt.className='track';mt.style.height='26px';mt.style.position='relative';
  for(let m=0;m<12;m++){const off=di(Y+'-'+String(m+1).padStart(2,'0')+'-01');
    const cell=document.createElement('div');cell.className='mcell';cell.style.left=(off*DAYW)+'px';
    cell.style.width=(DAYW*32)+'px';cell.textContent=MES[m];mt.appendChild(cell);}
  mh.appendChild(mt);chart.appendChild(mh);

  // peak markers (computed on current heat) - top contiguous high zones
  const peakBands=[];
  {const thr=Math.max(3,Math.round(mx*0.8));let s=-1;
   for(let i=0;i<=DAYS;i++){const hi=i<DAYS&&heat[i]>=thr;
     if(hi&&s<0)s=i; else if(!hi&&s>=0){peakBands.push([s,i-1]);s=-1;}}}

  // heat row
  const hr=document.createElement('div');hr.className='heatrow';
  const hl=document.createElement('div');hl.className='lab';
  hl.innerHTML='Saturación / día<small>máx '+mx+' simultáneas</small>';hr.appendChild(hl);
  const ht=document.createElement('div');ht.className='track';ht.style.height='34px';
  for(let i=0;i<DAYS;i++){const cell=document.createElement('div');cell.className='heatcell';
    cell.style.left=(i*DAYW)+'px';cell.style.width=(DAYW+0.5)+'px';
    cell.style.background=heatColor(heat[i],mx);
    cell.dataset.i=i; cell.addEventListener('mousemove',heatTip);cell.addEventListener('mouseleave',hideTip);
    ht.appendChild(cell);}
  peakBands.forEach(([a,b])=>{const pk=document.createElement('div');pk.className='peak';
    pk.style.left=(a*DAYW)+'px';pk.style.width=((b-a+1)*DAYW)+'px';
    const sp=document.createElement('span');sp.textContent='▲ pico';pk.appendChild(sp);ht.appendChild(pk);});
  hr.appendChild(ht);chart.appendChild(hr);

  // group by area
  const areas=Object.keys(AREACOLORS).filter(a=>areaOn[a]);
  areas.forEach(area=>{
    let list=visibleActs().filter(a=>a.area===area).sort((x,y)=>x.inicio<y.inicio?-1:1);
    if(!list.length)return;
    const g=document.createElement('div');g.className='grp';
    g.innerHTML='<span class="dot" style="background:'+AREACOLORS[area]+'"></span>'+area+' · '+list.length;
    chart.appendChild(g);
    list.forEach(a=>{
      const row=document.createElement('div');row.className='row';
      const lab=document.createElement('div');lab.className='lab';
      lab.innerHTML='<span class="dot" style="width:8px;height:8px;border-radius:50%;background:'+AREACOLORS[area]+'"></span><span class="nm">'+esc(a.titulo)+'</span>';
      row.appendChild(lab);
      const tr=document.createElement('div');tr.className='track';tr.style.height='30px';
      for(let m=1;m<12;m++){const gl=document.createElement('div');gl.className='gridline';
        gl.style.left=(di(Y+'-'+String(m+1).padStart(2,'0')+'-01')*DAYW)+'px';tr.appendChild(gl);}
      const s=di(a.inicio),e=di(a.fin);
      const bar=document.createElement('div');
      bar.className='bar'+((a.flags||[]).includes('tentativa')?' tent':'')+((a.flags||[]).includes('continua')?' cont':'');
      bar.style.left=(s*DAYW)+'px';bar.style.width=Math.max(7,(e-s+1)*DAYW)+'px';
      bar.style.background=AREACOLORS[area];
      bar.innerHTML='<span class="t">'+esc(a.titulo.replace(/^.*?>\s*/,''))+'</span>';
      bar._a=a;bar.addEventListener('mousemove',barTip);bar.addEventListener('mouseleave',hideTip);
      tr.appendChild(bar);row.appendChild(tr);chart.appendChild(row);
    });
  });
  renderKpis(heat,mx);
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function barTip(e){const a=e.currentTarget._a;
  let h='<h4>'+esc(a.titulo)+'</h4>';
  h+='<div class="meta">'+a.area+'</div>';
  if(a.imparte)h+='<div class="meta">Imparte: '+esc(a.imparte)+'</div>';
  if(a.lugar)h+='<div class="meta">Lugar: '+esc(a.lugar)+'</div>';
  if(a.modalidad)h+='<div class="meta">Modalidad: '+esc(a.modalidad)+'</div>';
  h+='<div class="meta">'+dlabel(a.inicio)+' → '+dlabel(a.fin)+'</div>';
  if((a.flags||[]).includes('tentativa'))h+='<div class="meta" style="color:#f4a259">⚠ fecha tentativa (solo mes confirmado)</div>';
  if((a.flags||[]).includes('continua'))h+='<div class="meta" style="color:#8fd">actividad permanente</div>';
  if(a.fecha_raw)h+='<div class="raw">"'+esc(a.fecha_raw)+'"</div>';
  showTip(e,h);}
function heatTip(e){const i=+e.currentTarget.dataset.i;
  const day=new Date(D0.getTime()+i*86400000);const iso=day.toISOString().slice(0,10);
  const list=heatActs().filter(a=>di(a.inicio)<=i&&i<=di(a.fin));
  let h='<h4>'+dlabel(iso)+' · '+list.length+' simultáneas</h4>';
  h+='<div class="meta">'+list.slice(0,12).map(a=>'• '+esc(a.titulo)).join('<br>')+(list.length>12?'<br>…':'')+'</div>';
  showTip(e,h);}
function showTip(e,h){tip.innerHTML=h;tip.style.display='block';
  let x=e.clientX+14,y=e.clientY+14;
  if(x+340>innerWidth)x=e.clientX-326;if(y+200>innerHeight)y=e.clientY-180;
  tip.style.left=x+'px';tip.style.top=y+'px';}
function hideTip(){tip.style.display='none';}

function renderKpis(heat,mx){
  const acts=visibleActs();
  const peakDay=heat.indexOf(mx);
  const iso=new Date(D0.getTime()+peakDay*86400000).toISOString().slice(0,10);
  const k=document.getElementById('kpis');
  k.innerHTML=
   kpi(acts.length,'actividades visibles')+
   kpi(mx,'pico de simultaneidad')+
   kpi(dlabel(iso),'día más saturado')+
   kpi(acts.filter(a=>(a.flags||[]).includes('tentativa')).length,'con fecha tentativa');
}
function kpi(b,s){return '<div class="kpi"><b>'+b+'</b><span>'+s+'</span></div>';}

// area filter chips
const af=document.getElementById('areaFilters');
Object.keys(AREACOLORS).forEach(a=>{
  if(!DATA.acts.some(x=>x.area===a))return;
  const c=document.createElement('label');c.className='chip';
  c.innerHTML='<span class="dot" style="background:'+AREACOLORS[a]+'"></span>'+a;
  c.addEventListener('click',()=>{areaOn[a]=!areaOn[a];c.classList.toggle('off',!areaOn[a]);render();});
  af.appendChild(c);
});
document.getElementById('tCont').addEventListener('change',e=>{countCont=e.target.checked;render();});
document.getElementById('tTent').addEventListener('change',e=>{showTent=e.target.checked;render();});
render();
</script>
